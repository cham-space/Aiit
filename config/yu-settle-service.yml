settle:
  db:
    master:
      url: jdbc:mysql://am-2ze971c528r07d56v167320o.ads.aliyuncs.com:3306/ynzyq_dc_eid_test?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
