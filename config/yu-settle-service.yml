# ===== Redis 配置 =====
  redis:
    host: 127.0.0.1
    port: 6379
    password:
    database: 0
    pool:
      max-total: 50
      max-idle: 10
      min-idle: 5
      max-wait: 3000

# ===== 阿里云短信配置 =====
  sms:
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:}
    sign-name: 资金归集监控
    template-code: ${ALIYUN_SMS_TEMPLATE_CODE:}

